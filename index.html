<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS Home work</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  
  <header class="header">
        <div class="container">
            <nav class="nav">
                <div class="logo">Physionic</div>
                <ul class="menu">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Product</a></li>
                    <li><a href="#">Pricing</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
                <a href="#" class="btn btn--blue btn--quote">Get Quote Now →</a>
            </nav>
        </div>
    </header>

    <main class="hero">
        
        <div class="container hero__content">
            <div class="hero__text">
                <h1 class="hero__title">Meet the Best Hospital</h1>
                <p class="hero__descr">
                    We know how large objects will act, but things on a small scale.
                </p>
                <div class="hero__actions">
                    <a href="#" class="btn btn--blue">Get Quote Now</a>
                    <a href="#" class="btn btn--outline">Learn More</a>
                </div>
            </div>

            <div class="hero__form-card">
                <h3>Book Appointment</h3>
                <form action="#">
                    <div class="form-group">
                        <label>Name *</label>
                        <input type="text" placeholder="Full Name *" required>
                    </div>
                    <div class="form-group">
                        <label>Email address *</label>
                        <input type="email" placeholder="example@gmail.com" required>
                    </div>
                    <div class="form-group">
                        <label>Department *</label>
                        <select>
                            <option value="">Please Select</option>
                            <option value="1">Therapy</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Time *</label>
                        <select>
                            <option value="">4:00 Available</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn--blue btn--full">Book Appointment</button>
                </form>
            </div>
        </div>
    </main>

</body>
</html>
